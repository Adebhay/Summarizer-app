<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            width: 380px;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8edf5 100%);
            margin: 0;
        }
        
        .header {
            text-align: center;
            margin-bottom: 16px;
        }
        
        .logo {
            font-size: 26px;
            font-weight: 800;
            color: #1a73e8;
            letter-spacing: -0.5px;
        }
        
        .logo span {
            color: #ea4335;
        }
        
        .tagline {
            font-size: 11px;
            color: #5f6368;
            margin-top: -2px;
            letter-spacing: 0.5px;
        }
        
        .user-id {
            font-size: 10px;
            color: #666;
            background: rgba(255,255,255,0.8);
            padding: 4px 10px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 12px;
            border: 1px solid #e8eaed;
        }
        
        .server-status {
            font-size: 11px;
            text-align: center;
            margin-bottom: 10px;
            padding: 4px;
            border-radius: 6px;
        }
        
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        
        .status-dot.online {
            background: #34a853;
        }
        
        .status-dot.offline {
            background: #ea4335;
        }
        
        .stats {
            background: white;
            padding: 14px;
            border-radius: 12px;
            margin: 10px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            max-height: 260px;
            overflow-y: auto;
        }
        
        .stats h4 {
            margin: 0 0 10px 0;
            color: #1a73e8;
            font-size: 13px;
            font-weight: 600;
        }
        
        .stats .site {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #f1f3f5;
            font-size: 13px;
        }
        
        .stats .site:last-child {
            border-bottom: none;
        }
        
        .stats .site-name {
            color: #202124;
        }
        
        .stats .site-time {
            color: #5f6368;
            font-weight: 500;
            font-size: 12px;
        }
        
        .stats .empty {
            color: #5f6368;
            font-size: 13px;
            text-align: center;
            padding: 20px 0;
        }
        
        .btn-primary {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
            margin-top: 10px;
        }
        
        .btn-primary:hover {
            background: #1557b0;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3);
        }
        
        .btn-primary:disabled {
            background: #bdc1c6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .summary {
            margin-top: 12px;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.5;
            display: none;
            border-left: 4px solid #34a853;
        }
        
        .summary.show {
            display: block;
        }
        
        .summary.loading {
            background: #fef7e0;
            color: #e37400;
            border-left-color: #f9ab00;
        }
        
        .summary.success {
            background: #e6f4ea;
            color: #1e7e34;
            border-left-color: #34a853;
        }
        
        .summary.error {
            background: #fce8e6;
            color: #c62828;
            border-left-color: #ea4335;
        }
        
        .footer {
            margin-top: 14px;
            text-align: center;
            font-size: 10px;
            color: #9aa0a6;
        }
        
        .footer .brand {
            color: #1a73e8;
            font-weight: 600;
        }
        
        /* Scrollbar styling */
        .stats::-webkit-scrollbar {
            width: 4px;
        }
        
        .stats::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        
        .stats::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🧠 Mentis<span>.</span>co</div>
        <div class="tagline">Your AI Productivity Coach</div>
    </div>
    
    <div class="user-id">🆔 <span id="userId">Loading...</span></div>
    
    <div class="server-status" id="serverStatus">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Checking server...</span>
    </div>
    
    <div class="stats" id="stats">
        <div class="empty">🌱 No activity tracked yet today.<br>Start browsing to see insights!</div>
    </div>
    
    <button class="btn-primary" id="summarizeBtn">🎯 Get AI Summary</button>
    
    <div class="summary" id="summary"></div>
    
    <div class="footer">© 2026 <span class="brand">Mentis.co</span> — All rights reserved</div>

    <script src="popup.js"></script>
</body>
</html>
